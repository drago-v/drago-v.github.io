<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover"
    >
    <title>Динамический виджет</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            border: 0 none;
            background: none;
        }
        body {
            font-weight: normal;
            font-size: 12px;
            font-family: Arial, sans-serif;
            background:#FFF;
        }
        html, body {
            width:100vw;height:100vh;background:linear-gradient(to top, #27ae60, #2ecc71);
        }
        .wrap {
            width:100%;height:100%;position:fixed;top:0;left:0;
            display:flex;align-items:center;justify-content:center;
        }
        .wrap2 {
            font-size:16px;max-width:75%;line-height:1.3;text-align:center;
        }
        .info {
            color:#FFF;
        }
        a {color:#FFF;font-weight:bold;}
    </style>
</head>
<body>
<div class="wrap">
    <div class="wrap2">
        <div class="info">
            Здравствуйте. С большим сожалением сообщаем, что наш сервис полностью прекратил работу.
            Если у вас остались вопросы, обратитесь в <a href="https://vk.me/top.stiker" target="_blank">личные сообщения</a> нашего сообщества</a>.
        </div>
    </div>
</div>
<script type="text/javascript" src="https://unpkg.com/@vkontakte/vk-bridge@2.2.2/dist/index.umd.js"></script>
<script>
    window.vkBridge.default.send('VKWebAppInit');
    window.vkBridge.default.send("VKWebAppSetViewSettings", {"status_bar_style": "dark", "action_bar_color": "#fff"});
</script>
</body>
</html>
